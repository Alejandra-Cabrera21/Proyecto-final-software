name: CI/CD Pipeline — Microencuestas

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── FASE 1: Build ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Instalar dependencias del backend
        run: npm ci
        working-directory: backend

      - name: Instalar dependencias del frontend
        run: npm ci
        working-directory: frontend

      - name: Generar cliente Prisma
        run: npx prisma generate
        working-directory: backend

      - name: Build del frontend
        run: npm run build
        working-directory: frontend

  # ── FASE 2: Pruebas unitarias ────────────────────────────────────────────────
  test:
    name: Pruebas unitarias (Jest)
    runs-on: ubuntu-latest
    needs: build

    env:
      JWT_SECRET: test-secret-ci
      JWT_EXPIRES_IN: 1h
      DATABASE_URL: postgresql://user:pass@localhost:5432/testdb

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias del backend
        run: npm ci
        working-directory: backend

      - name: Generar cliente Prisma
        run: npx prisma generate
        working-directory: backend

      - name: Ejecutar pruebas con cobertura (mínimo 70%)
        run: npm run test:ci
        working-directory: backend

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/

  # ── FASE 3: Deploy (solo en rama main) ───────────────────────────────────────
  deploy:
    name: Deploy a Producción
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy Frontend a Vercel
        run: echo "Deploy automático gestionado por integración Vercel + GitHub"

      - name: Deploy Backend a Railway
        run: echo "Deploy automático gestionado por integración Railway + GitHub"

      - name: Notificar deploy exitoso
        run: echo "✅ Deploy a producción completado desde rama main"
